name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # Let in-progress deploys finish (GitHub's recommended Pages setting). Cancelling
  # them mid-publish left the site on stale content after overlapping pushes.
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: Build static export
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_BASE_PATH: /justthefiles
          NEXT_PUBLIC_SITE_URL: https://fact16.github.io/justthefiles

      # Belt-and-braces: make sure nothing ever tries to Jekyll-process _next/.
      - name: Disable Jekyll
        run: touch apps/web/out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
